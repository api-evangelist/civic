aid: civic
name: Civic
description: >
  Civic is a digital identity and security platform offering authentication, identity verification, and AI agent
  security infrastructure. Core products include Civic Hub (a Model Context Protocol gateway with guardrails, audit
  logging, secret management, and instant revocation for AI agents connecting to tools), Civic Auth (OAuth 2.0 / PKCE
  authentication for web and mobile apps with email, Google, and Web3 wallet sign-in plus embedded wallets on Solana
  and EVM chains), and Civic Labs (open-source agent infrastructure components). Originally known as a Web3 identity
  and KYC verification platform issuing Civic Passes (non-transferable on-chain tokens representing verified user
  attributes), Civic has evolved into a broader agent security layer. The Hub MCP gateway exposes a single Streamable
  HTTP endpoint backed by 80+ pre-built MCP server integrations and is compatible with 23+ AI agent frameworks.
