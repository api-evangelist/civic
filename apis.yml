- aid: civic:civic-pass-api
  name: Civic Pass API
  description: >
    Civic Pass is a permissioning system that issues non-transferable on-chain tokens (Civic Passes) representing
    verified user attributes such as identity verification, liveness checks, and location. Passes are stored on
    Solana and EVM chains as attestations, keeping sensitive PII off-chain while enabling smart contracts and
    applications to gate access based on verified attributes. Civic has issued more than 925,000 Civic Passes.
    Use cases include bot prevention in Web3 gaming, DeFi access control, KYC-gated token sales, and
    wallet-based identity attestation. The Solana Attestation Service SDK and transfer hook for Token2022 are
    available as open-source libraries.
  humanURL: https://www.civic.com/
  baseURL: https://api.civic.com
