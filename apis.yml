apis:
- aid: civic:civic-hub-mcp-api
  name: Civic Hub MCP API
  description: >
    Civic Hub is a Model Context Protocol gateway that provides AI agents with secure, audited access to 80+ external
    tools and services through a single Streamable HTTP endpoint. Authentication uses 30-day Bearer tokens generated
    at app.civic.com. The gateway enforces least-privilege guardrails at the tool, server, and toolkit levels, logs
    every tool call with parameters and responses, manages OAuth tokens and API keys for connected services, and
    supports instant revocation of all agent access with a single click. Compatible with Anthropic SDK, OpenAI Agents
    SDK, LangChain, LangGraph, Pydantic AI, Vercel AI SDK, and all standard MCP clients.
  humanURL: https://docs.civic.com/
  baseURL: https://app.civic.com/hub/mcp
  tags:
  - AI Agents
  - Audit Logging
