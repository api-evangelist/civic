- aid: civic:civic-auth-api
  name: Civic Auth API
  description: >
    Civic Auth provides OAuth 2.0 and PKCE-based authentication for web and mobile applications with support for
    email, Google, and Web3 wallet sign-in. Includes embedded wallet provisioning on Solana and EVM chains. The
    @civic/auth npm package integrates with Next.js, React, Express, and Hono. The @civic/auth-web3 variant adds
    Web3-specific authentication via Wagmi. The @civic/auth-mcp package enables MCP server and client authentication
    with legacy OAuth compatibility endpoints including /.well-known/oauth-authorization-server, /authorize, /token,
    and /register. Client IDs are configured via environment variables and tokens are obtained through the standard
    OAuth 2.0 authorization code with PKCE flow.
  humanURL: https://docs.civic.com/
  baseURL: https://auth.civic.com
