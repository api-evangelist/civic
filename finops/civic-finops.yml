specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Civic
providerId: civic
created: '2026-06-14'
modified: '2026-06-14'
reconciled: true
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - AI Agents
  - MCP
  - Digital Identity
description: >
  FOCUS-aligned FinOps for Civic: subscription plus credit-based consumption for Civic Hub (AI agent
  MCP gateway), open-source SDK model for Civic Auth, and enterprise contract model for Civic Pass
  identity verification. The primary cost driver for Civic Hub is the $20/month standard plan with
  100,000 credits; overage costs are not publicly listed. Civic Auth has no direct API cost as an
  open-source SDK; infrastructure hosting costs apply. Civic Pass enterprise pricing is negotiated
  via sales.
sources:
  - https://www.civic.com/pricing/
  - https://docs.civic.com/civic/changelog
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Civic Technologies, Inc.
serviceCategory: Security and Identity
billingModel:
  pricingCategory: Subscription + Credit Consumption
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Credit
focusColumns:
  ServiceName: Civic Hub
  ServiceCategory: Security
  ProviderName: Civic
  PublisherName: Civic Technologies, Inc.
  InvoiceIssuerName: Civic Technologies, Inc.
  BillingCurrency: USD
meters:
  - name: hub_credits
    unit: credit
    aggregation: sum
    dimensions:
      - toolkit_profile
      - mcp_server
      - tool_name
  - name: hub_subscription
    unit: month
    aggregation: sum
    dimensions:
      - plan_tier
  - name: civic_pass_verifications
    unit: verification
    aggregation: sum
    dimensions:
      - pass_type
      - blockchain_network
principles:
  - name: Visibility
    description: >
      Monitor credit consumption per toolkit profile via the app.civic.com dashboard audit log.
      Every tool call is traced with parameters and responses, enabling granular cost attribution
      per AI agent workflow.
  - name: Allocation
    description: >
      Use distinct toolkit profiles (via ?profile= URL parameter) to isolate credit consumption
      by team, project, or agent. Each profile maps to a specific set of connected MCP servers.
  - name: Optimization
    description: >
      Enable only the MCP server connections your agents actually use. Revoke unused toolkit
      connections to reduce unnecessary credit burn. Apply guardrails to prevent runaway tool
      call loops from unexpected agents.
  - name: Accountability
    description: >
      Review the audit log monthly to correlate credit consumption with specific tool calls and
      agent invocations. Use kill-switch revocation immediately when unexpected usage patterns
      are detected.
